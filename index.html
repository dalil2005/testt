<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashing Light with Buzz</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: black;
        }
    </style>
</head>
<body>
    <audio id="buzzSound" loop>
        <source src="https://freesound.org/data/previews/320/320654_4939433-lq.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        // Flashing
        let on = false;
        setInterval(() => {
            document.body.style.backgroundColor = on ? 'white' : 'black';
            on = !on;
        }, 150); // change speed here (lower = faster)

        // Play buzzing sound
        const buzz = document.getElementById('buzzSound');
        buzz.volume = 0.3; // adjust volume if too loud
        buzz.play().catch(() => {
            // For mobile browsers: need user interaction first
            console.log("Touch the screen to start sound");
            document.body.addEventListener('click', () => buzz.play());
        });
    </script>
</body>
</html>
